name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Run evaluation (requires indexed data)
        if: hashFiles('data/faiss.index') != ''
        run: |
          python evaluator/runner.py --no-semantic --output eval_report.json

      - name: Upload eval report
        if: always() && hashFiles('eval_report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
